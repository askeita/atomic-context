# ─── Application ────────────────────────────────────────────────────────────
spring.application.name=atomic-context
# ─── MCP Server (shared) ─────────────────────────────────────────────────────
spring.ai.mcp.server.name=atomic-context
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.description=Read-only knowledge server for fundamental physical constants \
  (CODATA 2022), particle properties (PDG 2024), and material properties \
  (metals, alloys, semiconductors, ceramics) — electrical, mechanical, thermal, optical, magnetic.
# ─── Default profile (override with --spring.profiles.active=stdio or sse) ───
spring.profiles.default=sse
# ─── SQLite DataSource ───────────────────────────────────────────────────────
spring.datasource.url=jdbc:sqlite:${user.home}/.atomic-context/atomic-context.db
spring.datasource.driver-class-name=org.sqlite.JDBC
# ─── JPA / Hibernate ────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.atomiccontext=INFO
logging.level.org.springframework.ai.mcp=INFO
